<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<body>
<x-dc>

<template id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 56"><rect width="80" height="56" fill="#0a0e0d"/><text x="40" y="33" font-family="sans-serif" font-size="14" fill="#61FFD0" text-anchor="middle">EB</text></svg></template>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;500;600;700&amp;family=Audiowide&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html{margin:0;overflow-x:hidden}
  body{margin:0;color:#FFFFFFBD;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;scrollbar-width:none}
  body::-webkit-scrollbar{display:none}
  a{color:#61FFD0;text-decoration:none}
  a:hover{color:#8affe0}
  ::selection{background:#61FFD0;color:#08100d}
  @keyframes floatUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  @keyframes logoWave{0%{transform:translateY(0)}2%{transform:translateY(-0.17em)}4.5%{transform:translateY(0.05em)}7%{transform:translateY(0)}100%{transform:translateY(0)}}
  .logo-mark{display:inline-flex}
  .logo-char{display:inline-block;animation:logoWave 15s ease-in-out infinite;transform-origin:center bottom}
  @keyframes waterDrift1{0%{transform:translate(-4%,-3%) scale(1)}50%{transform:translate(5%,4%) scale(1.15)}100%{transform:translate(-4%,-3%) scale(1)}}
  @keyframes waterDrift2{0%{transform:translate(3%,-4%) scale(1.1)}50%{transform:translate(-6%,3%) scale(0.95)}100%{transform:translate(3%,-4%) scale(1.1)}}
  @keyframes waterDrift3{0%{transform:translate(-2%,5%) scale(0.95)}50%{transform:translate(4%,-5%) scale(1.1)}100%{transform:translate(-2%,5%) scale(0.95)}}
  @keyframes ctaShimmer{0%{background-position:0% 50%}100%{background-position:200% 50%}}
  @keyframes ctaRipple{0%{transform:scale(0.4);opacity:.5}100%{transform:scale(2.6);opacity:0}}
  @keyframes iconBob{0%,100%{transform:translateY(-3px) rotate(-2deg)}50%{transform:translateY(3px) rotate(2deg)}}
</style>
</helmet>

<div style="position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;overflow:hidden">

  <div style="position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1502680390469-be75c86b636f?fm=jpg&q=78&w=1600&auto=format&fit=crop&ixlib=rb-4.1.0') center/cover"></div>
  <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,32,50,.78) 0%,rgba(11,34,52,.7) 45%,rgba(12,36,54,.86) 82%,rgba(12,36,54,.96) 100%)"></div>

  <div style="position:relative;z-index:1;animation:floatUp .8s ease-out both;display:flex;align-items:center;justify-content:center;gap:12px">
    <span class="logo-mark" style="font-family:'Antonio',sans-serif;font-weight:700;font-size:clamp(28px,6vw,44px);letter-spacing:2px">
      <span class="logo-char" style="color:#7dffc4;animation-delay:0.00s">E</span><span class="logo-char" style="color:#77ffc6;animation-delay:0.08s">A</span><span class="logo-char" style="color:#72ffc9;animation-delay:0.16s">S</span><span class="logo-char" style="color:#6cffcb;animation-delay:0.24s">Y</span><span class="logo-char" style="color:#67ffce;animation-delay:0.32s">B</span><span class="logo-char" style="color:#61ffd0;animation-delay:0.40s">A</span><span class="logo-char" style="color:#5cfad3;animation-delay:0.48s">L</span><span class="logo-char" style="color:#57f4d6;animation-delay:0.56s">I</span><span class="logo-char" style="display:inline-block;align-self:center;width:0.2em;height:0.2em;border-radius:50%;background:#FFD668;vertical-align:baseline;margin:0 0.08em 0.06em 0.08em;animation-delay:0.64s"></span><span class="logo-char" style="color:#fff;animation-delay:0.72s">S</span><span class="logo-char" style="color:#fff;animation-delay:0.80s">U</span><span class="logo-char" style="color:#fff;animation-delay:0.88s">R</span><span class="logo-char" style="color:#fff;animation-delay:0.96s">F</span>
    </span>
  </div>

  <p style="position:relative;font-family:'Inter',sans-serif;color:#61FFD0;font-size:14px;font-weight:500;letter-spacing:.4px;text-transform:uppercase;margin:28px 0 0;animation:floatUp .9s .1s ease-out both">Coming soon</p>
  <h1 style="position:relative;font-family:'Antonio',sans-serif;font-weight:700;font-size:clamp(28px,5vw,42px);line-height:1.1;letter-spacing:-.5px;color:#fff;margin:14px 0 0;max-width:16ch;animation:floatUp 1s .2s ease-out both">We're waxing up the boards.</h1>
  <p style="position:relative;font-size:16px;line-height:1.7;margin:20px 0 0;max-width:44ch;color:#FFFFFFBD;animation:floatUp 1.1s .3s ease-out both">Certified coaching on Bali's best breaks — the good waves are worth the wait. Booking opens soon.</p>

  <a href="mailto:hello@easybali.surf" style="position:relative;overflow:hidden;display:inline-flex;align-items:center;gap:9px;background:linear-gradient(120deg,#7DFFC4,#61FFD0 40%,#3FD9E6 70%,#61FFD0);background-size:220% 100%;color:#08100d;font-weight:600;font-size:15px;padding:16px 30px;border-radius:100px;margin-top:36px;transition:transform .3s ease-out,box-shadow .3s ease-out,background-position 1.2s ease;animation:floatUp 1.2s .4s ease-out both,ctaShimmer 5s linear infinite;box-shadow:0 6px 24px rgba(97,255,208,.22)" style-hover="transform:translateY(-3px);box-shadow:0 14px 44px rgba(97,255,208,.5);background-position:100% 50%">
    <span aria-hidden="true" style="position:absolute;left:14px;top:50%;width:14px;height:14px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff,rgba(255,255,255,0) 60%);opacity:0;animation:ctaRipple 2.6s ease-out infinite"></span>
    hello@easybali.surf
  </a>

  <a href="onboard.html" style="position:relative;font-size:13px;color:#FFFFFF80;margin-top:22px;transition:color .3s ease,text-decoration-color .3s ease;text-decoration:underline wavy transparent;text-underline-offset:4px;animation:floatUp 1.3s .5s ease-out both" style-hover="color:#61FFD0;text-decoration-color:#61FFD0AA">Teach with us →</a>

</div>

</x-dc>

</html>
